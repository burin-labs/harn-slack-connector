[package]
name = "harn-slack-connector"
version = "0.1.0"
description = "Pure-Harn Slack Events API connector: signature verification, URL handshake, Web API dispatch."
license = "MIT OR Apache-2.0"
repository = "https://github.com/burin-labs/harn-slack-connector"

[exports]
default = "src/lib.harn"

[[providers]]
id = "slack"
connector = { harn = "src/lib.harn" }

# Harn-side package dependencies live here. This package currently has none.
[dependencies]

[connector_contract]
version = 1

[[connector_contract.fixtures]]
provider = "slack"
name = "url verification ack"
kind = "webhook"
headers = { "content-type" = "application/json", "x-slack-request-timestamp" = "1713659999", "x-slack-signature" = "v0=c6f5a5568a39a9cb38d1cc2e406ec157ea18f0468d278125104bdb44a5c7858c" }
metadata = { signing_secret = "event-secret", now = 1713659999, binding_id = "contract-slack-webhook", binding_version = 1, path = "/slack/events" }
body = '''{"token":"legacy-token","challenge":"challenge-abc-123","type":"url_verification"}'''
expect_type = "immediate_response"
expect_event_count = 0

[[connector_contract.fixtures]]
provider = "slack"
name = "signed message event"
kind = "webhook"
headers = { "content-type" = "application/json", "x-slack-request-timestamp" = "1713659999", "x-slack-signature" = "v0=900d7f33e65ec96e13d1f654e91a9cd0ce2b24ce036fde434835d2fcfd6c2def" }
metadata = { signing_secret = "event-secret", now = 1713659999, binding_id = "contract-slack-webhook", binding_version = 1, path = "/slack/events" }
body = '''{"token":"legacy-token","team_id":"T123","api_app_id":"A123","event":{"client_msg_id":"m-1","type":"message","text":"hello channel","user":"U111","ts":"1713650000.000100","team":"T123","channel":"C111","event_ts":"1713650000.000100","channel_type":"channel"},"type":"event_callback","event_id":"Ev-message-1","event_time":1713650000}'''
expect_type = "event"
expect_kind = "message"
expect_dedupe_key = "slack:event:Ev-message-1"
expect_signature_state = "verified"
expect_payload_contains = { event = "message", event_id = "Ev-message-1", api_app_id = "A123", team_id = "T123", channel_id = "C111", user_id = "U111", event_ts = "1713650000.000100", channel_type = "channel", channel = "C111", user = "U111", text = "hello channel", ts = "1713650000.000100" }
expect_event_count = 1

[[connector_contract.fixtures]]
provider = "slack"
name = "unsupported event reject"
kind = "webhook"
headers = { "content-type" = "application/json", "x-slack-request-timestamp" = "1713659999", "x-slack-signature" = "v0=56fe8d967430047e5ddab4f3053c1c1a2d2b601beb56d9e492371d9c8fc21ecf" }
metadata = { signing_secret = "event-secret", now = 1713659999, binding_id = "contract-slack-webhook", binding_version = 1, path = "/slack/events" }
body = '''{"token":"legacy-token","team_id":"T123","api_app_id":"A123","event":{"type":"workflow_step_execute","user":"U111","channel":"D111","event_ts":"1713650400.000100"},"type":"event_callback","event_id":"Ev-unsupported","event_time":1713650400}'''
expect_type = "reject"
expect_event_count = 0

[[connector_contract.fixtures]]
provider = "slack"
name = "app home opened legacy payload shape"
kind = "webhook"
headers = { "content-type" = "application/json", "x-slack-request-timestamp" = "1713659999", "x-slack-signature" = "v0=24db6e2f7441bd374cc9d12b40f9ef8c1b08639aa9dbc520996e8ed43a14b089" }
